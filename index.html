<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefly Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080c10;
    color: #e0e6ed;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }
  :root {
    --green: #00e5a0;
    --blue: #00b4d8;
    --bg: #080c10;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --muted: rgba(255,255,255,0.35);
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(12px);
    flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { color: var(--green); font-size: 20px; }
  .logo-text { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.25em; color: var(--muted); }
  .tabs { display: flex; gap: 6px; }
  .tab-btn {
    padding: 7px 16px; background: none;
    border: 1px solid transparent; border-radius: 8px;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.3);
    color: var(--green);
  }
  .schedule-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 18px; background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2); border-radius: 8px;
    color: var(--green); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; cursor: pointer;
    transition: background 0.2s;
  }
  .schedule-btn:hover { background: rgba(0,229,160,0.15); }

  /* LIVE BAR */
  .live-bar {
    background: rgba(0,229,160,0.05);
    border-bottom: 1px solid rgba(0,229,160,0.1);
    padding: 8px 32px;
    display: flex; align-items: center; gap: 24px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 1.5s infinite;
  }
  .live-label { color: var(--green); letter-spacing: 0.1em; }
  .live-stat { color: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MAIN */
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* SEARCH */
  .search-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .search-input {
    flex: 1; padding: 12px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 10px;
    color: #fff; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: rgba(0,229,160,0.4); }
  .search-input::placeholder { color: var(--muted); }
  .generate-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    border: none; border-radius: 10px;
    color: #000; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.08em; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .generate-btn:hover { opacity: 0.85; }

  /* TOPIC PILLS */
  .topics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .topic-pill {
    padding: 7px 15px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.07em; cursor: pointer;
    transition: all 0.2s;
  }
  .topic-pill.active {
    background: rgba(0,229,160,0.12);
    border-color: rgba(0,229,160,0.4);
    color: var(--green);
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 32px;
    margin-bottom: 20px;
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; color: var(--green); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .conf-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted);
  }
  .headline {
    font-size: 22px; font-weight: 600; line-height: 1.3;
    margin-bottom: 16px; color: #fff;
  }
  .summary { color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 24px; }

  /* KEY POINTS */
  .key-points-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; color: var(--muted); margin-bottom: 14px;
  }
  .key-point {
    display: flex; gap: 14px; align-items: flex-start;
    margin-bottom: 12px;
  }
  .kp-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--green); opacity: 0.6; min-width: 24px; padding-top: 2px;
  }
  .kp-text { color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5; }

  /* SIGNALS */
  .signals { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .signal {
    padding: 5px 12px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: rgba(255,255,255,0.5);
  }

  /* AI ANALYSIS */
  .ai-section { margin-top: 0; }
  .ai-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; color: rgba(0,229,160,0.7);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .ai-label::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 1.5s infinite;
  }
  .ai-text {
    color: rgba(255,255,255,0.6); line-height: 1.8; font-size: 14px;
    white-space: pre-wrap;
  }
  .ai-cursor {
    display: inline-block; width: 2px; height: 14px;
    background: var(--green); animation: blink 0.8s infinite;
    vertical-align: middle; margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* SOURCES */
  .source-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .source-row:last-child { border-bottom: none; }
  .source-name { font-weight: 600; font-size: 14px; }
  .source-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .trust-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    text-align: right;
  }

  /* CREDIBILITY BAR */
  .cred-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .cred-bar-bg {
    width: 80px; height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .cred-bar-fill { height: 100%; border-radius: 2px; }
  .cred-val { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%; border-radius: 8px;
    animation: shimmer 1.5s infinite; margin-bottom: 12px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: #0f1419; border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 100%; max-width: 480px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer;
  }
  .modal h2 {
    font-family: 'IBM Plex Mono', monospace; font-size: 16px;
    margin-bottom: 4px;
  }
  .modal-sub {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--green); letter-spacing: 0.15em; margin-bottom: 24px;
  }
  .field-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 0.12em; margin-bottom: 10px;
  }
  .freq-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .freq-btn {
    flex: 1; padding: 10px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .freq-btn.active {
    background: rgba(0,229,160,0.15);
    border-color: var(--green); color: var(--green);
  }
  .time-input {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    color: #fff; font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; outline: none; margin-bottom: 20px;
  }
  .modal-topics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .modal-topic {
    padding: 6px 12px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 20px;
    color: rgba(255,255,255,0.4); font-size: 11px;
    font-family: 'IBM Plex Mono', monospace; cursor: pointer;
    transition: all 0.2s;
  }
  .modal-topic.active {
    background: rgba(0,229,160,0.12);
    border-color: rgba(0,229,160,0.5); color: var(--green);
  }
  .activate-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    border: none; border-radius: 10px; color: #000;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s;
  }
  .activate-btn:hover { opacity: 0.85; }
  .success-msg {
    text-align: center; color: var(--green);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    padding: 14px; background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2); border-radius: 10px;
  }
  .section-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    font-weight: 700; margin-bottom: 4px;
  }
  .section-sub {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 0.12em; margin-bottom: 20px;
  }
  .archive-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; cursor: pointer;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  .archive-item:hover { border-color: rgba(0,229,160,0.3); }
  .archive-topic {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--green); letter-spacing: 0.15em; margin-bottom: 6px;
  }
  .archive-headline { font-weight: 600; margin-bottom: 8px; }
  .archive-conf {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay hidden" id="scheduleModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>Schedule Briefings</h2>
    <div class="modal-sub">AUTOMATED INTELLIGENCE DELIVERY</div>
    <div class="field-label">FREQUENCY</div>
    <div class="freq-row">
      <button class="freq-btn active" onclick="setFreq(this,'Daily')">Daily</button>
      <button class="freq-btn" onclick="setFreq(this,'Weekly')">Weekly</button>
      <button class="freq-btn" onclick="setFreq(this,'Breaking')">Breaking</button>
    </div>
    <div class="field-label">DELIVERY TIME</div>
    <input class="time-input" type="time" value="07:00" />
    <div class="field-label">TOPICS TO MONITOR</div>
    <div class="modal-topics" id="modalTopics"></div>
    <div id="activateWrap">
      <button class="activate-btn" onclick="activateSchedule()">Activate Schedule</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-icon">◈</span>
    <div>
      <div class="logo-text">Briefly</div>
      <div class="logo-sub">INTELLIGENCE</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('briefing',this)">briefing</button>
    <button class="tab-btn" onclick="switchTab('sources',this)">sources</button>
    <button class="tab-btn" onclick="switchTab('archive',this)">archive</button>
  </div>
  <button class="schedule-btn" onclick="openModal()">⏰ SCHEDULE</button>
</header>

<!-- LIVE BAR -->
<div class="live-bar">
  <div class="live-dot"></div>
  <span class="live-label">LIVE</span>
  <span class="live-stat">247 sources monitored</span>
  <span class="live-stat">14 briefings today</span>
  <span class="live-stat">96.2% avg credibility</span>
</div>

<!-- MAIN -->
<main>

  <!-- BRIEFING TAB -->
  <div id="tab-briefing">
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Enter any topic for an intelligence briefing..." onkeydown="if(event.key==='Enter')doCustomSearch()" />
      <button class="generate-btn" onclick="doCustomSearch()">GENERATE BRIEF</button>
    </div>
    <div class="topics" id="topicPills"></div>
    <div id="briefingContent"></div>
  </div>

  <!-- SOURCES TAB -->
  <div id="tab-sources" class="hidden">
    <div class="card">
      <div class="section-title">Source Intelligence Registry</div>
      <div class="section-sub">CREDIBILITY RATINGS UPDATED DAILY</div>
      <div id="sourcesList"></div>
    </div>
  </div>

  <!-- ARCHIVE TAB -->
  <div id="tab-archive" class="hidden">
    <div class="section-title">Briefing Archive</div>
    <div class="section-sub">PAST INTELLIGENCE REPORTS</div>
    <div id="archiveList"></div>
  </div>

</main>

<script>
const TOPICS = ["Technology","Finance","Geopolitics","Science","Climate","AI & Machine Learning","Health","Defense"];
const SOURCES = [
  {name:"Reuters",credibility:94,bias:"Center",type:"Wire Service"},
  {name:"Financial Times",credibility:91,bias:"Center-Right",type:"Business"},
  {name:"The Economist",credibility:89,bias:"Center-Right",type:"Magazine"},
  {name:"AP News",credibility:96,bias:"Center",type:"Wire Service"},
  {name:"Bloomberg",credibility:90,bias:"Center",type:"Financial"},
  {name:"Foreign Affairs",credibility:88,bias:"Center",type:"Academic"},
];
const BRIEFINGS = {
  Technology:{
    headline:"Semiconductor Supply Chain Faces Critical Inflection Point",
    summary:"Global chip manufacturers are navigating an unprecedented convergence of export controls, geopolitical tensions, and AI-driven demand surges. TSMC's Arizona fab expansion signals a fundamental restructuring of semiconductor geography.",
    keyPoints:["TSMC Arizona fab reaches 50% production capacity ahead of schedule","New US export controls target advanced chip-making equipment to China","NVIDIA announces H200 successor with 3x inference performance gains","EU Chips Act funding disbursements begin Q2 2026"],
    sources:[0,4,1],signals:["📈 Supply tightening","⚠️ Regulatory risk elevated","🔬 Innovation acceleration"],confidence:87,readTime:"4 min"
  },
  Geopolitics:{
    headline:"Indo-Pacific Alliance Architecture Undergoes Strategic Realignment",
    summary:"Shifting defense partnerships across the Indo-Pacific are reshaping strategic calculations for major powers. New bilateral agreements signal a move toward distributed deterrence frameworks.",
    keyPoints:["Philippines-US expand Balikatan exercise scope to include maritime interdiction","Japan's defense budget reaches historic 2% GDP threshold","QUAD foreign ministers convene emergency consultations in Washington","South Korea accelerates indigenous missile defense program"],
    sources:[0,5,2],signals:["🔺 Tension elevated","🤝 Alliance deepening","🛡️ Defense spending surge"],confidence:82,readTime:"5 min"
  },
  Finance:{
    headline:"Central Banks Signal Synchronized Easing Cycle May Be Premature",
    summary:"Persistent core services inflation is challenging the narrative of imminent rate cuts across G7 economies. Bond markets are repricing terminal rate expectations as labor markets demonstrate unexpected resilience.",
    keyPoints:["Fed minutes reveal division on pace of normalization","ECB's Lagarde warns against premature policy pivot","10-year Treasury yields reach 4.8%, highest since November","Private credit markets absorb $200B in new issuance Q1 2026"],
    sources:[1,4,2],signals:["📉 Rate cut expectations repriced","💰 Credit spreads widening","⚡ Volatility elevated"],confidence:91,readTime:"4 min"
  }
};

let activeTopic = "Technology";
let modalSelectedTopics = ["Technology","Finance"];

// --- INIT ---
function init() {
  renderTopicPills();
  renderModalTopics();
  renderSources();
  renderArchive();
  generateBriefing("Technology");
}

// --- TOPIC PILLS ---
function renderTopicPills() {
  const wrap = document.getElementById('topicPills');
  wrap.innerHTML = TOPICS.map(t => `
    <button class="topic-pill${t===activeTopic?' active':''}" onclick="selectTopic('${t}')">${t.toUpperCase()}</button>
  `).join('');
}

function selectTopic(t) {
  activeTopic = t;
  document.getElementById('searchInput').value = '';
  renderTopicPills();
  generateBriefing(t);
}

function doCustomSearch() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  activeTopic = val;
  renderTopicPills();
  generateBriefing(val);
}

// --- BRIEFING ---
function generateBriefing(topic) {
  const container = document.getElementById('briefingContent');
  container.innerHTML = `
    <div class="card">
      <div class="skeleton" style="height:12px;width:120px;margin-bottom:16px"></div>
      <div class="skeleton" style="height:28px;width:80%"></div>
      <div class="skeleton" style="height:28px;width:60%;margin-bottom:20px"></div>
      <div class="skeleton" style="height:14px"></div>
      <div class="skeleton" style="height:14px;width:90%"></div>
      <div class="skeleton" style="height:14px;width:75%"></div>
    </div>`;

  setTimeout(() => {
    const mock = BRIEFINGS[topic] || BRIEFINGS["Technology"];
    const sourcesHtml = mock.sources.map(i => {
      const s = SOURCES[i];
      const color = s.credibility >= 90 ? '#00e5a0' : '#f0c040';
      return `<div class="source-row">
        <div>
          <div class="source-name">${s.name}</div>
          <div class="source-meta">${s.type} · ${s.bias}</div>
        </div>
        <div class="trust-badge" style="color:${color}">${s.credibility >= 90 ? '✓ HIGH TRUST' : '~ MODERATE'}</div>
      </div>`;
    }).join('');

    const signalsHtml = mock.signals.map(s => `<span class="signal">${s}</span>`).join('');
    const kpHtml = mock.keyPoints.map((pt,i) => `
      <div class="key-point">
        <span class="kp-num">0${i+1}</span>
        <span class="kp-text">${pt}</span>
      </div>`).join('');

    container.innerHTML = `
      <div class="card">
        <div class="card-label">
          <span>${(topic).toUpperCase()}</span>
          <span class="conf-badge">${mock.readTime} READ · CONF. ${mock.confidence}%</span>
        </div>
        <div class="headline">${mock.headline}</div>
        <div class="summary">${mock.summary}</div>
        <div class="key-points-label">KEY DEVELOPMENTS</div>
        ${kpHtml}
        <div class="signals">${signalsHtml}</div>
      </div>
      <div class="card ai-section">
        <div class="ai-label">AI INTELLIGENCE ANALYSIS</div>
        <div class="ai-text" id="aiText"><span id="aiCursor" class="ai-cursor"></span></div>
      </div>
      <div class="card">
        <div class="card-label">SOURCES USED IN THIS BRIEFING</div>
        ${sourcesHtml}
      </div>`;

    streamAnalysis(topic);
  }, 600);
}

async function streamAnalysis(topic) {
  const el = document.getElementById('aiText');
  if (!el) return;
  el.innerHTML = '<span id="aiCursor" class="ai-cursor"></span>';
  try {
    const response = await fetch("https://claudebriefly.onrender.com/api/briefing", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ topic })
    });
    const data = await response.json();
    if (data.error) {
      el.innerHTML = 'AI analysis temporarily unavailable. Structured briefing data loaded from verified sources.';
      return;
    }
    // Typewriter effect
    const text = data.analysis;
    let i = 0;
    el.innerHTML = '';
    const interval = setInterval(() => {
      if (i < text.length) {
        el.innerHTML = text.slice(0, i+1).replace(/\n\n/g,'<br><br>');
        i++;
      } else {
        clearInterval(interval);
      }
    }, 12);
  } catch {
    if (el) el.innerHTML = 'AI analysis temporarily unavailable. Structured briefing data loaded from verified sources.';
  }
}

// --- SOURCES TAB ---
function renderSources() {
  document.getElementById('sourcesList').innerHTML = SOURCES.map(s => {
    const color = s.credibility >= 90 ? '#00e5a0' : '#f0c040';
    const pct = s.credibility + '%';
    return `<div class="source-row">
      <div>
        <div class="source-name">${s.name}</div>
        <div class="source-meta">${s.type} · ${s.bias}</div>
      </div>
      <div>
        <div class="cred-bar-wrap">
          <div class="cred-bar-bg"><div class="cred-bar-fill" style="width:${pct};background:${color}"></div></div>
          <span class="cred-val" style="color:${color}">${s.credibility}%</span>
        </div>
        <div class="trust-badge" style="color:${color};margin-top:4px">${s.credibility >= 90 ? '✓ HIGH TRUST' : '~ MODERATE'}</div>
      </div>
    </div>`;
  }).join('');
}

// --- ARCHIVE TAB ---
function renderArchive() {
  document.getElementById('archiveList').innerHTML = Object.entries(BRIEFINGS).map(([topic, b]) => `
    <div class="archive-item" onclick="switchTab('briefing');selectTopic('${topic}')">
      <div class="archive-topic">${topic.toUpperCase()}</div>
      <div class="archive-headline">${b.headline}</div>
      <div class="archive-conf">CONF. ${b.confidence}%</div>
    </div>`).join('');
}

// --- TABS ---
function switchTab(tab, btn) {
  ['briefing','sources','archive'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.trim() === tab) b.classList.add('active');
  });
}

// --- MODAL ---
function renderModalTopics() {
  document.getElementById('modalTopics').innerHTML = TOPICS.map(t => `
    <button class="modal-topic${modalSelectedTopics.includes(t)?' active':''}" onclick="toggleModalTopic(this,'${t}')">${t}</button>
  `).join('');
}
function toggleModalTopic(el, t) {
  el.classList.toggle('active');
  if (modalSelectedTopics.includes(t)) modalSelectedTopics = modalSelectedTopics.filter(x=>x!==t);
  else modalSelectedTopics.push(t);
}
function setFreq(btn, f) {
  document.querySelectorAll('.freq-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function openModal() { document.getElementById('scheduleModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('scheduleModal').classList.add('hidden'); document.getElementById('activateWrap').innerHTML='<button class="activate-btn" onclick="activateSchedule()">Activate Schedule</button>'; }
function activateSchedule() {
  document.getElementById('activateWrap').innerHTML = `<div class="success-msg">✓ Schedule activated successfully</div>`;
}

init();
</script>
